<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CA8A04"/>
      <stop offset="50%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#CA8A04"/>
    </linearGradient>
  </defs>
  
  <!-- Hanger icon -->
  <g transform="translate(8, 8)">
    <!-- Hanger hook -->
    <path d="M32 8 C32 4, 36 2, 38 2 C40 2, 42 4, 42 6 C42 8, 40 10, 38 10" 
          stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Hanger body -->
    <path d="M38 10 L38 18 L12 38 L64 38 L38 18" 
          stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Heart in hanger -->
    <path d="M33 28 C33 26, 35 24, 37.5 26 C40 24, 42 26, 42 28 C42 31, 37.5 34, 37.5 34 C37.5 34, 33 31, 33 28Z" 
          fill="url(#gold)" opacity="0.6"/>
    <!-- Bottom bar -->
    <rect x="8" y="40" width="60" height="2.5" rx="1.25" fill="url(#gold)" opacity="0.3"/>
  </g>

  <!-- Text: KLEDINGBANK -->
  <text x="88" y="35" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#1C1917" letter-spacing="3">KLEDINGBANK</text>
  
  <!-- Text: OSS -->
  <text x="88" y="58" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" font-weight="300" fill="#CA8A04" letter-spacing="8">OSS</text>
  
  <!-- Tagline -->
  <text x="88" y="73" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="8.5" font-weight="400" fill="#44403C" letter-spacing="1.5">VOOR IEDEREEN DIE HET NODIG HEEFT</text>
</svg>
